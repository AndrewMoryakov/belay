name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: hooks (node --test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # git is preinstalled on all GitHub runners; the hooks shell out to it.
      - run: node --test hooks/hooks.test.mjs
